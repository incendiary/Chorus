# ─────────────────────────────────────────────────────────────────────────────
# Chorus Engine — Docker Compose Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker-compose up --build          # Build and start all services
#   docker-compose up -d               # Start in detached (background) mode
#   docker-compose down                # Stop and remove containers
#   docker-compose down -v             # Stop and remove containers + volumes
#
# The Streamlit UI will be available at: http://localhost:8501
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── Chorus Application ─────────────────────────────────────────────────────
  chorus:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: chorus-engine:latest
    container_name: chorus-engine

    ports:
      - "127.0.0.1:8501:8501"       # Streamlit UI (localhost only)

    environment:
      # Whisper configuration
      WHISPER_MODEL:    "${WHISPER_MODEL:-base}"
      WHISPER_DEVICE:   "${WHISPER_DEVICE:-cpu}"
      WHISPER_LANGUAGE: "${WHISPER_LANGUAGE:-}"

      # Multi-model consensus (v2.1+)
      # Comma-separated Whisper model names for consensus voting.
      # The first listed model is treated as primary.
      # Example: CONSENSUS_MODELS=base,small
      CONSENSUS_MODELS: "${CONSENSUS_MODELS:-}"

      # LLM reconstruction via Ollama (v3.0+)
      # Base URL of the local Ollama server.
      OLLAMA_BASE_URL:          "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      # Ollama model to use for LOW-token recovery.
      OLLAMA_MODEL:             "${OLLAMA_MODEL:-llama3.1:8b}"
      # Seconds to wait for an Ollama API response before aborting.
      OLLAMA_TIMEOUT_SECONDS:   "${OLLAMA_TIMEOUT_SECONDS:-20}"

      # Streamlit
      STREAMLIT_SERVER_PORT:                  "8501"
      STREAMLIT_SERVER_ADDRESS:               "127.0.0.1"
      STREAMLIT_SERVER_HEADLESS:              "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS:   "false"

    volumes:
      # Persist Whisper model weights across container restarts
      - whisper_cache:/home/chorus/.cache/whisper

      # Persist pipeline outputs on the host for inspection
      - ./outputs:/app/outputs

      # Mount sample audio directory for easy test file access
      - ./sample_audio:/app/sample_audio

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

    # Resource limits — adjust for your hardware
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  whisper_cache:
    name: chorus_whisper_cache
    driver: local
