# ─────────────────────────────────────────────────────────────────────────────
# Chorus Engine — Release Workflow
# ─────────────────────────────────────────────────────────────────────────────
# Triggered on version tag pushes (v*). Runs the full test suite, builds and
# pushes Docker images to GHCR (CPU + GPU), and creates a GitHub Release with
# auto-generated release notes.
#
# This ensures that every git tag has a corresponding GitHub Release and that
# container images are always published for tagged versions.
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:

  # ── Test ──────────────────────────────────────────────────────────────────────
  # Run the full test suite before publishing anything.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install librosa soundfile scipy nltk numpy
          python -c "import nltk; nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True); nltk.download('stopwords', quiet=True)"

      - name: Run tests
        run: pytest --tb=short

  # ── Docker Publish ───────────────────────────────────────────────────────────
  # Builds CPU and GPU images, tags with version + latest, pushes to GHCR.
  docker-publish:
    name: Docker Publish
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push CPU image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: runtime
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/chorus:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/chorus:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push GPU image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.gpu
          target: runtime-gpu
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/chorus:${{ steps.version.outputs.tag }}-gpu
            ghcr.io/${{ github.repository_owner }}/chorus:latest-gpu
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release ───────────────────────────────────────────────────────────
  # Creates a GitHub Release with auto-generated notes from merged PRs/commits.
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: docker-publish
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "${TAG}" \
            --title "Chorus ${TAG}" \
            --generate-notes \
            --verify-tag

  # ── Post-release Consistency Check ─────────────────────────────────────────
  # Runs strict version/release/documentation consistency checks once release
  # publication has completed.
  post-release-consistency:
    name: Post-release Consistency
    runs-on: ubuntu-latest
    needs: github-release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Strict version consistency check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash tests/version_consistency_test.sh --ci
