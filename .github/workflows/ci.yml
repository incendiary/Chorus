name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Secret Scan ─────────────────────────────────────────────────────────────
  # Runs first — no code is tested until the working tree is confirmed clean.
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Layer 1: Pattern matching
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Layer 2: Verified credential detection
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.95.2
        with:
          extra_args: --results=verified,unknown

      # Layer 3: Entropy baseline
      - name: detect-secrets baseline check
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline

  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black==24.4.2 ruff==0.4.7 isort

      - name: Black
        run: black --check .

      - name: Ruff
        run: ruff check .

      - name: isort
        run: isort --check-only .

  # ── Test ──────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install librosa soundfile scipy nltk numpy
          python -c "import nltk; nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True); nltk.download('stopwords', quiet=True)"

      - name: Run tests
        run: pytest --tb=short

  # ── Dependency Audit ─────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969 || true

  # ── Version-Tag Drift Check ─────────────────────────────────────────────────
  # Warns (via GitHub issue) if pyproject.toml version has no matching git tag.
  # Non-blocking — runs in parallel with lint/test.
  version-tag-check:
    name: Version-Tag Sync
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag exists for pyproject version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          TAG="v${VERSION}"
          echo "pyproject.toml version: ${VERSION}"
          echo "Expected tag: ${TAG}"

          if git tag -l "${TAG}" | grep -q "${TAG}"; then
            echo "✅ Tag ${TAG} exists."
          else
            echo "::warning::Tag ${TAG} does not exist for pyproject.toml version ${VERSION}."
            echo "Creating issue to track missing tag…"
            EXISTING=$(gh issue list --search "Release tag ${TAG} missing" --state open --json number --jq '.[0].number' || true)
            if [ -z "${EXISTING}" ]; then
              gh issue create \
                --title "Release tag ${TAG} missing" \
                --body "pyproject.toml declares version \`${VERSION}\` but no git tag \`${TAG}\` exists on main. Either tag the release or revert the version bump." \
                --label "release"
            else
              echo "Issue #${EXISTING} already open — skipping."
            fi
          fi
