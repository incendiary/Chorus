repos:
  # GitLeaks: Detect secrets in commits
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: GitLeaks — Detect secrets
        description: Scans for hardcoded credentials, API keys, tokens
        entry: gitleaks protect --verbose --redact
        language: golang
        stages: [commit]
        pass_filenames: false

  # Ruff: Fast Python linter (security + style)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.0
    hooks:
      - id: ruff
        name: Ruff — Python linter
        description: Check Python code for style, performance, security
        args: [--fix]
        types: [python]
      - id: ruff-format
        name: Ruff Format — Auto-format Python code
        types: [python]

  # isort: Python import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort — Sort Python imports
        args: [--profile=black, --line-length=100]
        types: [python]

  # Trailing whitespace and EOF normalization
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

default_language_version:
  python: "3.11"

ci:
  autofix_commit_msg: "chore(pre-commit): auto-fix linting and formatting"
  autofix_prs: true
  autoupdate_schedule: weekly
  skip: [gitleaks]
  stages: [commit]
